name: Daily Commit

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git with IITM email
        run: |
          git config --global user.name "23f2000576"
          git config --global user.email "23f2000576@ds.study.iitm.ac.in"

      - name: Make a change (always)
        run: |
          echo "Last updated: $(date)" > status.txt

      - name: Commit and push
        run: |
          git add status.txt
          git commit -m "Daily update by 23f2000576@ds.study.iitm.ac.in"
          git push
