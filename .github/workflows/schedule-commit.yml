name: Daily Commit

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update timestamp file
        run: |
          echo "Last updated: $(date)" >> status.txt

      - name: Commit changes
      run: |
        git config --global user.name "23f2000576"
        git config --global user.email "23f2000576@ds.study.iitm.ac.in"
        git add status.txt
        git commit -m "Daily update" || echo "Nothing to commit"
        git push
