name: Daily Commit

on:
  schedule:
    - cron: '0 10 * * *'   # Runs once daily at 10:00 UTC
  workflow_dispatch:       # Allows manual run for testing

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # REQUIRED: Step name must contain your IITM email
      - name: Update daily log for 23f2000576@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date)" > status.txt

      - name: Configure Git
        run: |
          git config --global user.name "23f2000576"
          git config --global user.email "23f2000576@ds.study.iitm.ac.in"

      - name: Commit and push changes
        run: |
          git add status.txt
          git commit -m "Daily update by 23f2000576" || echo "No changes"
          git push
