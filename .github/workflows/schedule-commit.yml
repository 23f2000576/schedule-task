name: Daily Commit

on:
  schedule:
    - cron: '0 12 * * *'    # Runs every day at 12:00 UTC
  workflow_dispatch:        # Allows manual runs

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update daily log for 23f2000576@ds.study.iitm.ac.in
        run: |
          mkdir -p logs
          echo "Updated at $(date)" >> logs/daily.txt

      - name: Commit changes with 23f2000576@ds.study.iitm.ac.in
        run: |
          git config user.name "GitHub Actions"
          git config user.email "23f2000576@ds.study.iitm.ac.in"
          git add logs/daily.txt
          git commit -m "Daily update by GitHub Actions (23f2000576@ds.study.iitm.ac.in)" || echo "No changes to commit"
          git push
